    <meta charset="UTF-8" />

    <meta name="description" content="Editor visual para contenido de Instagram y redes sociales con IA" />
    <title>SocialCanvas — Editor Visual IA</title>
  <script>
    // SPA redirect restore for GitHub Pages
    (function() {
      var p = window.location.search.match(/[?&]p=([^&]+)/);
      if (p) {
        window.history.replaceState(null, null,
          window.location.pathname + decodeURIComponent(p[1]).replace(/~and~/g, '&') +
          (window.location.hash ? window.location.hash : '')
        );
      }
    })();
  </script>
